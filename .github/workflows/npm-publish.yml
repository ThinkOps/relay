name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run tests and package audit without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            echo "No npm lockfile; skipping install for zero-dependency package."
          fi

      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          node -e 'const pkg = require("./package.json"); const tag = process.env.GITHUB_REF_NAME; const expected = "v" + pkg.version; if (tag !== expected) { console.error("Release tag " + tag + " does not match package.json version " + pkg.version + ". Expected " + expected + "."); process.exit(1); }'

      - name: Run tests
        run: npm test

      - name: Audit package contents
        run: npm pack --dry-run

      - name: Publish
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: npm publish --access public

      - name: Skip publish
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'false'
        run: echo "Dry run complete; npm publish was skipped."
